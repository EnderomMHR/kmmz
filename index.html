<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KMMZ</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:40px;
    background:#f5f5f5;
}

.container{
    max-width:1200px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
}

.header{
    display:flex;
    align-items:center;
    gap:20px;
}

.line-number{
    width:60px;
    height:60px;
    background:#ff4fa3;
    color:white;
    font-size:32px;
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
}

.title{
    color:#ff4fa3;
    font-size:36px;
    font-weight:bold;
}

.subtitle{
    margin-top:10px;
    font-size:22px;
}

.map-button{
    margin-top:30px;
    padding:15px 25px;
    border:none;
    background:#ff4fa3;
    color:white;
    font-size:18px;
    cursor:pointer;
    border-radius:5px;
}
</style>

</head>
<body>

<div class="container">

<div class="header">
<div class="line-number">1</div>
<div>
<div class="title">KMMZ</div>
<div class="subtitle">Linia 1 - Miękinia Stawiska → Libiąż Kopalnia Janina</div>
</div>
</div>

<button class="map-button">
Przykładowa strona KMMZ działa!
</button>

</div>

</html>
