<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Linia 1 - KMMZ</title>

<style>

*{
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    margin:0;
    padding:20px;
    background:linear-gradient(135deg,#005bbb,#009966);
}

.container{
    max-width:1400px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.back{
    display:inline-block;
    text-decoration:none;
    color:white;
    background:#005bbb;
    padding:12px 20px;
    border-radius:10px;
    font-weight:bold;
}

.line-number{
    text-align:center;
    font-size:90px;
    font-weight:bold;
    color:#f5c400;
    margin-top:20px;
}

.route{
    text-align:center;
    font-size:18px;
    color:#555;
    margin-bottom:40px;
}

.columns{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:50px;
}

.column h2{
    text-align:center;
    color:#005bbb;
    border-bottom:3px solid #f5c400;
    padding-bottom:10px;
}

.stop{
    display:block;
    text-decoration:none;
    color:#222;
    padding:6px 0;
}

.stop:hover{
    color:#005bbb;
}

.variant{
    margin-left:30px;
    font-style:italic;
}

@media(max-width:900px){

    .columns{
        grid-template-columns:1fr;
    }

}

</style>
</head>
<body>

<div class="container">

<a class="back" href="../linie.html">← Powrót do listy linii</a>

<div class="route">

</div>

<div class="columns">

</html>
